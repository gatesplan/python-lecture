# 5-1 디지털기술과 사회변화

## 1. 유비쿼터스 환경

언제 어디서나 접속이 가능한 환경. 내장된 센서가 주변을 인지하고 실시간으로 통신하여 정보를 제공한다.

핵심 4가지 영역:
1. 스마트 시티
2. 스마트 홈
3. 웨어러블
4. 글로벌 네트워크

### 예시 문항
**Q1.** 다음 중 유비쿼터스 환경의 핵심 4가지 영역에 해당하지 않는 것은?
- (1) 스마트 시티
- (2) 스마트 홈
- (3) 웨어러블
- (4) 글로벌 네트워크
- (5) 메인프레임 컴퓨팅

정답: (5)
해설: 메인프레임은 중앙집중식 대형 컴퓨터로, 분산되고 어디서나 연결되는 유비쿼터스의 개념과 반대이다.

## 2. 디지털 핵심 기술 4가지

4가지 핵심 기술이 하나의 시스템으로 연결되어 작동한다.

- 사물 인터넷 (IoT, 수집): 현실 세계의 데이터를 실시간으로 수집한다.
- 클라우드 (Cloud, 저장): 물리적 한계 없이 데이터를 저장하고 공유한다.
- 빅데이터 (Big Data, 분석): 데이터에서 가치 있는 패턴과 원인을 찾는다.
- 인공지능 (AI, 실행): 데이터를 학습하여 스스로 판단·실행한다.

### 예시 문항
**Q2.** 다음 중 디지털 4대 기술과 그 역할의 연결이 옳지 않은 것은?
- (1) 사물 인터넷 - 수집
- (2) 클라우드 - 저장
- (3) 빅데이터 - 분석
- (4) 인공지능 - 실행
- (5) 블록체인 - 통신

정답: (5)
해설: 4대 기술은 IoT, 클라우드, 빅데이터, AI이며 블록체인은 포함되지 않는다.

**Q3.** 다음 빈칸에 들어갈 기술은?
"USB와 같은 이동형 저장장치 없이도, 전 세계 어디서든 적은 비용으로 데이터를 공유할 수 있게 한 기술은 (    )이다."

정답: 클라우드(Cloud)

---

## 3. 데이터의 수집과 저장

사물 인터넷과 클라우드는 데이터를 모으고, 언제 어디서든 접근할 수 있게 한다.

- 사물 인터넷: 온도·습도를 감지·조절하여 의약품 운송의 안전성을 확보한다.
- 클라우드: 이동형 저장장치 없이도 적은 비용으로 데이터를 공유할 수 있게 한다.

### 예시 문항
**Q4.** 의약품 운송 과정에서 온도·습도를 실시간으로 감지·조절하는 데 가장 직접적으로 활용되는 기술은?
- (1) 인공지능
- (2) 빅데이터
- (3) 사물 인터넷
- (4) 메타버스
- (5) 클라우드

정답: (3)
해설: 환경 데이터를 센서로 수집·제어하는 것은 IoT의 역할이다.

---

## 4. 데이터의 분석과 실행

빅데이터와 인공지능은 데이터에서 원인을 찾고 해결책을 실행한다.

- 빅데이터: 특정 질환 환자들의 행동 데이터를 분석하여 병의 원인을 찾는다.
- 인공지능: 딥러닝으로 산불 발생 지역을 자동으로 탐지한다.

### 예시 문항
**Q5.** 다음 사례에 해당하는 기술을 옳게 짝지은 것은?
- (가) 환자들의 행동 데이터를 모아 병의 원인을 찾는다.
- (나) 산불 발생 지역을 기계가 스스로 탐지한다.

- (1) 가-IoT, 나-클라우드
- (2) 가-빅데이터, 나-인공지능
- (3) 가-인공지능, 나-빅데이터
- (4) 가-클라우드, 나-IoT
- (5) 가-빅데이터, 나-IoT

정답: (2)
해설: 데이터에서 패턴을 찾는 것은 빅데이터, 학습 기반 자율 판단·실행은 AI의 역할이다.

## 5. 디지털 트윈 사례 - 스마트 안전 축사

현실의 대상을 디지털 공간에 동일하게 구현하여 시뮬레이션한다.

- 센서 데이터 수집: 바이오센서와 24시간 카메라가 생육 상태를 전송한다.
- 가상 시뮬레이션: 클라우드와 빅데이터로 최적의 환경(온도/질병 예측)을 분석한다.
- AI 자율 제어: 현실 축사의 환경을 자동으로 조절하여 생산성을 높이고 질병을 예방한다.

### 예시 문항
**Q6.** 다음 설명에 해당하는 개념은?
"현실의 문제를 해결하기 위해 디지털 공간에 현실과 동일한 모델을 만들어 시뮬레이션하는 기술"

정답: 디지털 트윈(Digital Twin)

---

## 6. 미래 기술 4가지

- 메타버스 (Metaverse): 3차원 가상 공간의 확장. 가상 공간 내 상호작용을 통해 새로운 가치를 만든다.
- 웨어러블 (Wearables): 반지·안경 형태의 기기가 심박수·뇌파 등 생체 신호를 감지하여 건강 이상을 예측한다.
- 자율주행 (Autonomous Driving): 외부 환경을 스스로 인지하고 주행한다. 농업 인력 부족을 완화하고 작업 효율을 높인다.
- 투명 모니터 (Transparent Displays): 유리창이 디스플레이로 활용되어 정보를 표시한다.

### 예시 문항
**Q7.** 다음 중 미래 기술과 그 특징의 연결이 옳지 않은 것은?
- (1) 메타버스 - 3차원 가상 공간 내 상호작용
- (2) 웨어러블 - 생체 신호 기반 건강 예측
- (3) 자율주행 - 외부 환경을 스스로 인지하여 주행
- (4) 투명 모니터 - 유리창이 정보 디스플레이로 활용
- (5) 디지털 트윈 - 인간을 대신하는 휴머노이드 로봇

정답: (5)
해설: 디지털 트윈은 현실의 모델을 디지털 공간에 만드는 기술이며, 휴머노이드 로봇과는 다르다.

## 7. 직업의 디지털 전환

기존 직업의 수행 방식이 디지털 기술과 결합하여 변화한다.

| 직업 | 아날로그 방식 | 디지털 전환 |
| --- | --- | --- |
| 간호사 | 사람이 직접 체중/신장 측정·기록 | 신체 계측 자동화 시스템과 의료 데이터 연동 |
| 심판 | 인간의 육안 판정 | 초고속 카메라 및 AI VAR 인식 결과 기반 판정 |
| 만화 작가 | 종이와 펜으로 작화 | 태블릿과 생성형 AI를 활용한 창작 |

### 예시 문항
**Q8.** 다음 중 직업의 디지털 전환 사례로 적절하지 않은 것은?
- (1) 간호사가 자동 신체 계측 시스템으로 데이터를 의료 시스템과 연동한다.
- (2) 심판이 AI VAR 인식 결과를 토대로 판정한다.
- (3) 만화 작가가 태블릿과 생성형 AI로 작화한다.
- (4) 농부가 자율주행 농기계로 작업 효율을 높인다.
- (5) 회계사가 모든 분개를 수기 장부로만 정리한다.

정답: (5)
해설: 수기 장부 정리는 디지털 전환과 반대되는 아날로그 방식이다.

---

## 8. 디지털 시대의 유망 직업

디지털 기술이 융합되며 새로운 직업이 등장하고 있다.

- 인공지능 전문가: AI 프로그램 개발 및 학습 설계
- 스마트 안전 관리사: VR, AR, 드론을 활용한 건설/산업 현장 사고 예방
- 미래 자동차 전문가: 전기차, 자율주행, 커넥티드카 연구
- 환경 빅데이터 전문가: 환경 데이터를 구축하여 기후 위기 의사결정 지원
- VR/AR 콘텐츠 기획자: 교육, 군사, 관광, 예술 등 가상현실 경험 설계

### 예시 문항
**Q9.** 다음 중 본 단원에서 제시한 디지털 시대의 유망 직업이 아닌 것은?
- (1) 인공지능 전문가
- (2) 스마트 안전 관리사
- (3) 미래 자동차 전문가
- (4) 환경 빅데이터 전문가
- (5) 전통 활자 인쇄 기능사

정답: (5)

---

## 9. 기계와 인간의 영역 비교

- 기계의 영역: 방대한 데이터 수집 / 24시간 연속 연산 / 위험 지역 탐지 / 반복적이고 정밀한 작업
- 인간의 영역: 맥락 이해 / 창의적 문제 해결 / 윤리적 판단 / 타인과의 공감

### 예시 문항
**Q10.** 다음 중 기계가 인간보다 잘하는 영역이 아닌 것은?
- (1) 방대한 데이터의 수집
- (2) 24시간 연속적인 연산
- (3) 위험 지역의 탐지
- (4) 반복적이고 정밀한 작업
- (5) 타인의 감정에 대한 공감

정답: (5)
해설: 공감은 인간 고유의 영역이다.

**Q11.** 다음 중 인간 고유의 영역에 해당하는 것을 모두 고르면?
ㄱ. 맥락 이해   ㄴ. 24시간 연산   ㄷ. 윤리적 판단   ㄹ. 위험 지역 탐지   ㅁ. 창의적 문제 해결

- (1) ㄱ, ㄴ, ㄷ
- (2) ㄱ, ㄷ, ㅁ
- (3) ㄴ, ㄹ, ㅁ
- (4) ㄱ, ㄹ, ㅁ
- (5) ㄴ, ㄷ, ㄹ

정답: (2)
해설: ㄴ, ㄹ은 기계의 영역이다.

## 10. 인지 역량 3가지

- 컴퓨팅 사고 (Computational Thinking): 문제를 컴퓨터의 데이터 처리 방식처럼 논리적으로 분석하고 해결하는 능력
- 지식 정보 처리 (Information Processing): 지식과 정보를 비판적으로 탐구하고, AI 기술을 이해하여 활용하는 능력
- 창의적 사고 (Creative Thinking): 다양한 기술과 경험을 융합하여 새로운 것을 만드는 능력

### 예시 문항
**Q12.** 다음 설명에 해당하는 역량은?
"문제를 컴퓨터의 데이터 처리 방식처럼 논리적으로 분석하고 해결하는 능력"

- (1) 창의적 사고
- (2) 컴퓨팅 사고
- (3) 지식 정보 처리
- (4) 협력적 소통
- (5) 공동체 역량

정답: (2)

---

## 11. 사회 역량 2가지

- 협력적 소통 (Collaborative Communication): 타인의 관점을 존중하고 자신의 생각을 효과적으로 표현하여 공동의 목적을 위해 협력하는 능력
- 공동체 역량 (Community Competence): 자신이 속한 사회를 이해하고, 지속 가능한 발전을 위해 책임감 있게 디지털 기술을 사용하는 태도

### 예시 문항
**Q13.** 다음 중 디지털 시대의 5가지 핵심 역량에 해당하지 않는 것은?
- (1) 컴퓨팅 사고
- (2) 지식 정보 처리
- (3) 창의적 사고
- (4) 협력적 소통
- (5) 기계적 암기력

정답: (5)
해설: 5대 역량은 컴퓨팅 사고, 지식 정보 처리, 창의적 사고, 협력적 소통, 공동체 역량이다.

# 5-2 정보보호와 보안

## 12. 정보의 양면성: 공익과 사생활

정보의 공유와 보호는 충돌할 수 있는 두 가치이다. 코로나19 확진자 동선 공개가 대표 사례이다.

- 감염 확산 방지 (공유와 공익)
- 사생활 침해 방지 (보호와 개인)

### 예시 문항
**Q14.** 코로나19 확진자 동선 공개 사례가 보여주는 정보의 특성으로 가장 적절한 것은?
- (1) 정보는 항상 보호되어야 한다.
- (2) 정보는 항상 공유되어야 한다.
- (3) 정보는 공익과 사생활이라는 두 가치가 충돌하는 양면성을 갖는다.
- (4) 정보 공개는 어떠한 경우에도 개인에게 피해를 주지 않는다.
- (5) 사생활 보호는 공공의 이익보다 항상 우선한다.

정답: (3)

---

## 13. 정보 유출의 피해 범위

정보 유출은 개인, 기업, 국가 모든 차원에서 피해를 일으킨다.

- 개인: 사생활 침해 및 금전적 손실 (예: 스마트폰, 신분증)
- 기업: 신뢰도 하락 및 경제적 타격 (예: 영업비밀, 지적 재산)
- 국가: 안보 위협 (예: 군사 기밀, 외교 정보)

### 예시 문항
**Q15.** 정보 유출의 피해 단위와 그 사례의 연결이 옳지 않은 것은?
- (1) 개인 - 신분증 도용
- (2) 개인 - 스마트폰 사진 유출
- (3) 기업 - 영업비밀 유출
- (4) 국가 - 군사 기밀 유출
- (5) 국가 - 개인 SNS 사진 유출

정답: (5)
해설: SNS 사진 유출은 개인 차원의 피해이다.

## 14. 보호할 정보와 공유할 정보

## 15. 정보 보안 3대 원칙 (CIA Triad)

- 기밀성 (Confidentiality): 허락된 사람만 접근할 수 있어야 한다.
- 무결성 (Integrity): 데이터가 위·변조되지 않고 원본 그대로 유지되어야 한다.
- 가용성 (Availability): 필요할 때 언제든 사용할 수 있어야 한다.

- (3) 가용성 (Availability)

- (5) 정답 없음 (1~3 모두 해당)

해설: 책임성은 보안의 확장 원칙으로 거론되기도 하나, 본 단원이 제시한 CIA 3원칙에는 포함되지 않는다.

- (1) 기밀성
- (2) 무결성

## 17. 악성 코드(Malware) 5종

- 바이러스 (Virus): 정상 파일에 기생하여 감염시킨다.
- 웜 (Worm): 네트워크를 통해 스스로 복제한다.
- 트로이 목마 (Trojan Horse): 정상 프로그램으로 위장하여 침투한다.
- 스파이웨어 (Spyware): 사용자 모르게 개인정보를 수집한다.
- 랜섬웨어 (Ransomware): 파일을 암호화하고 복구 대가로 금전을 요구한다.

### 예시 문항
**Q22.** 다음 설명에 해당하는 악성 코드는?
"사용자의 파일을 암호화해 잠그고, 풀어주는 대가로 금전을 요구한다."

- (1) 웜
- (2) 트로이 목마
- (3) 랜섬웨어
- (4) 스파이웨어
- (5) 바이러스

정답: (3)

**Q23.** 악성 코드와 특징의 연결이 옳지 않은 것은?
- (1) 바이러스 - 정상 파일에 기생하여 감염
- (2) 웜 - 네트워크를 통해 스스로 복제
- (3) 트로이 목마 - 정상 프로그램으로 위장
- (4) 스파이웨어 - 사용자 몰래 개인정보 수집
- (5) 랜섬웨어 - 다른 컴퓨터를 자동으로 좀비화하여 공격 명령 대기

정답: (5)
해설: 좀비 PC를 만들어 명령을 대기시키는 것은 봇넷의 특징이며, 랜섬웨어는 파일을 암호화하고 몸값을 요구한다.

## 19. 정보 보안 기술 1: 암호화와 방화벽

- 암호화 (Encryption): 데이터를 변환하여 탈취되어도 내용을 읽을 수 없도록 한다.
- 방화벽 (Firewall): 인터넷과 내부 네트워크 사이에서 비정상 트래픽을 차단하고 정상 트래픽만 허용한다.

- (1) 암호화
- (2) 방화벽
- (3) 전자 서명
- (4) 생체 인증
- (5) 백신

정답: (2)

- (2) 외부 침입을 물리적으로 차단하는 장비이다.
- (3) 사용자를 식별하기 위한 생체 정보를 의미한다.
- (4) 악성 코드를 자동으로 탐지·제거하는 프로그램이다.
- (5) 데이터를 빠르게 복제하여 분산 저장하는 기술이다.

정답: (1)

## 27. 온라인 탈억제 효과 (Online disinhibition effect)

사이버 공간에서 긴장이 완화되고 구속감을 적게 느끼며, 평소보다 개방적으로 자신을 표현하게 되는 현상.

[온라인 탈억제 효과를 가져오는 요인]
- 익명성: 누구인지 식별되지 않음
- 비대면성: 상대를 직접 보지 않음
- 다중 정체성: 상황에 따라 인격이 달라짐
- 집단행동의 논리: 다수의 행동을 따라 함

- (2) 비대면성

- (5) 실명 인증 의무
