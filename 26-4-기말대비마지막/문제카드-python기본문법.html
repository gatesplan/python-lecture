<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Python 기본문법 문제 카드 (AI 튜터)</title>
<style>
  body { font-family: "Malgun Gothic", "맑은 고딕", sans-serif; max-width: 760px;
         margin: 0 auto; padding: 24px; line-height: 1.6; color: #111; background: #fff; }
  h1 { font-size: 22px; border-bottom: 2px solid #333; padding-bottom: 8px; }

  /* 계열 필터 */
  .panel { border: 1px solid #ccc; border-radius: 6px; padding: 12px 16px; margin: 14px 0; }
  .panel-title { font-size: 13px; color: #666; margin-bottom: 8px; }
  .cats { display: flex; flex-wrap: wrap; gap: 6px 16px; }
  .cats label { font-size: 14px; cursor: pointer; user-select: none; }
  .cat-actions { margin-top: 10px; display: flex; gap: 8px; }
  .mini { padding: 4px 10px; font-size: 13px; font-family: inherit; cursor: pointer;
          border: 1px solid #888; border-radius: 4px; background: #f2f2f2; }
  .mini:hover { background: #e6e6e6; }

  /* 정답률 통계 */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 14px 0; }
  .stat { border: 1px solid #ccc; border-radius: 6px; padding: 8px; text-align: center; }
  .stat-label { font-size: 12px; color: #777; }
  .stat-val { font-size: 20px; font-weight: bold; }
  .stat-sub { font-size: 12px; color: #999; }

  /* 문제별 진행 타일 */
  .tiles { display: flex; flex-wrap: wrap; gap: 2px; margin: 10px 0 14px; }
  .tile { width: 11px; height: 11px; border-radius: 2px; background: #ddd; }
  .tile.ok { background: #4a9a52; }
  .tile.no { background: #c14a4a; }
  .opt { font-size: 14px; cursor: pointer; user-select: none; }

  /* 문제 카드 */
  .card { border: 1px solid #bbb; border-radius: 6px; padding: 20px; margin-top: 10px; }
  .question { font-size: 17px; font-weight: bold; margin: 4px 0 18px; white-space: pre-wrap; }
  .qcat { font-size: 12px; color: #888; }

  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice { text-align: left; padding: 10px 14px; border: 1px solid #ccc; border-radius: 4px;
            background: #fafafa; cursor: pointer; font-size: 15px; font-family: inherit;
            white-space: pre-wrap; }
  .choice:hover:enabled { background: #eef3ff; border-color: #88a; }
  .choice:disabled { cursor: default; }
  .choice .mark { display: inline-block; width: 22px; color: #888; font-weight: bold; }
  .choice.correct { background: #d8f0db; border-color: #4a9a52; }
  .choice.wrong   { background: #f6d9d9; border-color: #c14a4a; }

  .verdict { margin-top: 16px; font-weight: bold; }
  .verdict.ok { color: #2e7d32; }
  .verdict.no { color: #c62828; }
  .explain { margin-top: 8px; padding: 10px 14px; background: #f5f5f5;
             border-left: 4px solid #888; font-size: 14px; display: none; white-space: pre-wrap; }
  .empty { color: #c62828; font-weight: bold; }

  .actions { margin-top: 18px; }
  button.btn { padding: 9px 18px; font-size: 15px; font-family: inherit; cursor: pointer;
               border: 1px solid #555; border-radius: 4px; background: #f0f0f0; }
  button.btn:hover:enabled { background: #e2e2e2; }
  button.btn:disabled { color: #aaa; border-color: #ccc; cursor: default; background: #f7f7f7; }

  /* AI 튜터 채팅 */
  .chat { border: 1px solid #bbb; border-radius: 6px; margin-top: 14px; }
  .chat-head { display: flex; justify-content: space-between; align-items: center;
               padding: 8px 14px; border-bottom: 1px solid #ddd; background: #f7f7f7;
               border-radius: 6px 6px 0 0; }
  .chat-title { font-size: 13px; color: #555; font-weight: bold; }
  .chat-msgs { max-height: 320px; overflow-y: auto; padding: 12px 14px;
               display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 14px;
         white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: #e3edff; border: 1px solid #b9cdf2; }
  .msg.ai   { align-self: flex-start; background: #f2f2f2; border: 1px solid #ddd; }
  .msg.wait { align-self: flex-start; color: #888; background: #f9f9f9; border: 1px dashed #ccc; }
  .msg.err  { align-self: flex-start; color: #c62828; background: #fdf0f0; border: 1px solid #e3b6b6; }
  .chat-input { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #ddd; }
  .chat-input textarea { flex: 1; resize: none; height: 42px; padding: 8px 10px;
                         font-family: inherit; font-size: 14px; border: 1px solid #bbb;
                         border-radius: 4px; }
  .chat-empty { color: #999; font-size: 13px; }
</style>
</head>
<body>

<h1>Python 기본문법 문제 카드 (AI 튜터)</h1>

<div class="panel">
  <div class="panel-title">계열 선택</div>
  <div class="cats" id="cats"></div>
  <div class="cat-actions">
    <button class="mini" id="checkAll">전체 선택</button>
    <button class="mini" id="uncheckAll">전체 해제</button>
  </div>
</div>

<div class="panel">
  <label class="opt"><input type="checkbox" id="onlyUnsolved"> 새 문제는 안 푼/틀린 문제 중에서만 출제</label>
  <div class="cat-actions">
    <button class="mini" id="resetProgress">기록 초기화</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="tiles" id="tiles"></div>

<div class="card" id="quiz">
  <div class="qcat" id="qcat"></div>
  <div class="question" id="question"></div>
  <div class="choices" id="choices"></div>
  <div class="verdict" id="verdict"></div>
  <div class="explain" id="explain"></div>
  <div class="actions">
    <button class="btn" id="nextBtn">다음 문제</button>
  </div>
</div>

<div class="chat" id="chat">
  <div class="chat-head">
    <span class="chat-title">AI 튜터 - 이 문제에 대해 질문하세요</span>
    <button class="mini" id="chatClear">대화 지우기</button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input">
    <textarea id="chatText" placeholder="질문 입력 후 Enter (줄바꿈: Shift+Enter)"></textarea>
    <button class="btn" id="chatSend">전송</button>
  </div>
</div>

<script>
/* =========================================================
   설정 (문제 세트를 교체한 새 버전을 만들 때 여기만 손대면 됨)
   1) 이 파일을 복사한다
   2) SET_ID를 새 값으로 바꾼다 - 풀이기록/대화기록 localStorage 키가
      이 값으로 분리되므로, 문제 세트가 다르면 반드시 바꿔야 한다
   3) 아래 QUESTIONS 배열을 새 문제로 교체한다
   ========================================================= */
var SET_ID = 'python-basics-2026-1';
var OPENAI_API_KEY = ''; // 사용 시 키 입력
var OPENAI_URL = 'https://api.openai.com/v1/chat/completions';
var CHAT_MODEL = 'gpt-5.4-mini';     // 주답변 모델
var SUMMARY_MODEL = 'gpt-5.4-nano';  // 대화 요약(60자) 모델

/* =========================================================
   문제 데이터 (이 배열만 교체하면 됨)
   - cat     : 계열(체크박스가 자동 생성됨)
   - q       : 문제 지문
   - choices : 선택지 3~5개
   - answer  : 정답 인덱스(0부터)
   - explain : 해설 (줄바꿈은 \n)
   ========================================================= */
const QUESTIONS = [
  {
    "cat": "서식지정",
    "q": "f\"{7:>3}\" 의 결과(따옴표 안 공백 포함)는?",
    "choices": [
      "\"  7\"",
      "\"7  \"",
      "\" 7 \"",
      "\"777\""
    ],
    "answer": 0,
    "explain": ":>3 은 폭 3칸을 확보하고 오른쪽 정렬한다. 7은 한 글자이므로 왼쪽 2칸이 공백으로 채워져 '  7'이 된다. 왼쪽 정렬은 :<, 가운데 정렬은 :^ 를 쓴다."
  },
  {
    "cat": "서식지정",
    "q": "print(f\"{'hi':<4}\" + \"!\") 의 출력은?",
    "choices": [
      "hi  !",
      "  hi!",
      "hi!",
      "hi ! "
    ],
    "answer": 0,
    "explain": ":<4 는 폭 4칸 왼쪽 정렬이라 'hi' 뒤에 공백 2칸이 붙어 'hi  '가 되고, 그 뒤에 !가 이어져 'hi  !'가 된다. 부등호가 향하는 쪽으로 값이 붙는다고 기억하면 쉽다(< 왼쪽, > 오른쪽)."
  },
  {
    "cat": "서식지정",
    "q": "print(f\"{3.14159:.2f}\") 의 출력은?",
    "choices": [
      "3.14",
      "3.15",
      "3.1",
      "3.142"
    ],
    "answer": 0,
    "explain": ":.2f 는 소수점 둘째 자리까지 반올림해 고정 소수점으로 표시한다. 셋째 자리가 1이라 버려져 3.14가 된다. 자리가 모자라면 0으로 채운다(예: 1234.5 -> 1234.50)."
  },
  {
    "cat": "서식지정",
    "q": "print(f\"{2.5:.3f}\") 의 출력은?",
    "choices": [
      "2.500",
      "2.5",
      "2.50",
      "오류 발생"
    ],
    "answer": 0,
    "explain": ":.3f 는 소수점 셋째 자리까지 표시하며, 자리가 모자라면 0으로 채운다. 2.5는 2.500이 된다. :.Nf 의 N을 바꾸면 표시할 소수 자리 수가 달라진다."
  },
  {
    "cat": "서식지정",
    "q": "다음 코드의 목적으로 가장 알맞은 것은?\n\nmenu = [(\"Kimbap\", 3000), (\"Ramen\", 4500)]\nfor name, price in menu:\n    print(f\"{name:<8}{price:>6}\")",
    "choices": [
      "메뉴 이름은 왼쪽 정렬(8칸), 가격은 오른쪽 정렬(6칸)로 칸을 맞춰 표처럼 출력한다",
      "메뉴 이름은 오른쪽 정렬, 가격은 왼쪽 정렬로 출력한다",
      "메뉴 이름을 8번, 가격을 6번 반복해서 출력한다",
      "가격을 소수점 6자리까지 출력한다"
    ],
    "answer": 0,
    "explain": ":<8 은 폭 8칸 왼쪽 정렬, :>6 은 폭 6칸 오른쪽 정렬이다. 문자열(이름)은 왼쪽, 숫자(가격)는 오른쪽으로 정렬하면 줄마다 칸이 맞아 표처럼 보인다. '표를 깔끔하게 출력하는 서식 지정자'의 대표 패턴."
  },
  {
    "cat": "서식지정",
    "q": "print(f\"[{'AI':^6}]\") 의 출력은?",
    "choices": [
      "[  AI  ]",
      "[AI    ]",
      "[    AI]",
      "[ AI ]"
    ],
    "answer": 0,
    "explain": ":^6 은 폭 6칸 가운데 정렬이다. 'AI'는 2글자라 남는 4칸을 좌우 2칸씩 나눠 채워 '  AI  '가 된다."
  },
  {
    "cat": "서식지정",
    "q": "f\"{12.3:>8.2f}\" 의 결과(따옴표 안 공백 포함)는?",
    "choices": [
      "\"   12.30\"",
      "\"12.30   \"",
      "\"    12.3\"",
      "\"12.3    \""
    ],
    "answer": 0,
    "explain": ":>8.2f 는 먼저 소수점 둘째 자리로 만들고(12.30, 5글자) 폭 8칸에 오른쪽 정렬한다. 왼쪽에 공백 3칸이 채워져 '   12.30'이 된다. 정렬+폭+소수 자리를 한 번에 지정하는 조합형."
  },
  {
    "cat": "서식지정",
    "q": "f\"{12345:>3}\" 의 결과는?",
    "choices": [
      "12345 (그대로 출력)",
      "123",
      "345",
      "오류 발생"
    ],
    "answer": 0,
    "explain": "지정한 폭(3)보다 내용(5글자)이 길면 잘리지 않고 그대로 출력된다. 폭은 최소로 확보할 칸수일 뿐, 내용을 자르는 기능이 아니다."
  },
  {
    "cat": "함수",
    "q": "다음 코드의 출력은?\n\ndef f(x):\n    x = x + 1\n    print(x)\n\na = 5\nf(a)\nprint(a)",
    "choices": [
      "첫 줄 6, 둘째 줄 5",
      "첫 줄 6, 둘째 줄 6",
      "첫 줄 5, 둘째 줄 5",
      "첫 줄 5, 둘째 줄 6"
    ],
    "answer": 0,
    "explain": "함수 안의 x는 지역변수라서 x = x + 1 은 함수 안에서만 유효하다. 정수는 불변이므로 전역 a에는 영향이 없다. 함수 안에서 6, 밖에서 5가 출력된다."
  },
  {
    "cat": "함수",
    "q": "다음 코드의 출력은?\n\ndef add_item(L):\n    L.append(4)\n\na = [1, 2, 3]\nadd_item(a)\nprint(a)",
    "choices": [
      "[1, 2, 3, 4]",
      "[1, 2, 3]",
      "[4]",
      "오류 발생"
    ],
    "answer": 0,
    "explain": "함수에 리스트를 넘기면 복사본이 아니라 같은 객체를 가리키는 이름표(L)가 하나 더 생긴다. 리스트는 가변 객체라 함수 안에서 append로 내부를 수정하면 원본 a에도 그대로 반영되어 [1, 2, 3, 4]가 된다. 정수를 넘겼을 때(원본 불변)와 대비되는 함정."
  },
  {
    "cat": "함수",
    "q": "다음 코드의 출력은?\n\ndef greet(name):\n    print(\"Hello,\", name)\n\nresult = greet(\"Kim\")\nprint(result)",
    "choices": [
      "Hello, Kim 다음 줄에 None",
      "Hello, Kim 다음 줄에 Hello, Kim",
      "None 한 줄만 출력",
      "오류 발생"
    ],
    "answer": 0,
    "explain": "greet는 print만 하고 return이 없으므로 반환값은 None이다. 호출 시 Hello, Kim이 출력되고, result에는 None이 들어가 print(result)는 None을 출력한다."
  },
  {
    "cat": "함수",
    "q": "다음 코드의 출력은?\n\ndef calc(a, b=10):\n    return a * b\n\nprint(calc(3), calc(3, 2))",
    "choices": [
      "30 6",
      "6 30",
      "30 30",
      "오류 발생"
    ],
    "answer": 0,
    "explain": "b=10 은 기본값 매개변수다. calc(3)은 b를 생략해 3*10=30, calc(3, 2)는 b=2가 전달되어 3*2=6이다. 인자를 주면 기본값 대신 그 값이 쓰인다."
  },
  {
    "cat": "함수",
    "q": "다음 코드의 출력은?\n\ncount = 0\ndef add():\n    global count\n    count += 1\n\nadd()\nadd()\nprint(count)",
    "choices": [
      "2",
      "0",
      "1",
      "오류 발생"
    ],
    "answer": 0,
    "explain": "global count 선언으로 함수 안에서 전역변수 count를 직접 바꿀 수 있다. add()가 두 번 호출되어 0에서 2가 된다. global이 없었다면 지역변수 취급이라 오류가 났을 것이다."
  },
  {
    "cat": "함수",
    "q": "다음 코드의 출력과 함수의 역할을 바르게 짝지은 것은?\n\ndef mystery(n):\n    s = 0\n    while n > 0:\n        s += n % 10\n        n //= 10\n    return s\n\nprint(mystery(123))",
    "choices": [
      "6 - 각 자리 숫자의 합을 구한다",
      "3 - 자릿수의 개수를 센다",
      "123 - 수를 그대로 반환한다",
      "6 - 약수의 합을 구한다"
    ],
    "answer": 0,
    "explain": "n % 10 은 마지막 자리 숫자, n //= 10 은 마지막 자리를 떼어내는 연산이다. 123은 3+2+1=6이 되어 각 자리 숫자의 합을 구하는 자릿수 분해 패턴임을 알 수 있다."
  },
  {
    "cat": "함수",
    "q": "다음 함수의 역할로 가장 알맞은 것은? (n은 2 이상)\n\ndef check(n):\n    for i in range(2, n):\n        if n % i == 0:\n            return False\n    return True",
    "choices": [
      "n이 소수인지 판별한다",
      "n의 약수 개수를 센다",
      "n이 짝수인지 판별한다",
      "n의 약수 합을 구한다"
    ],
    "answer": 0,
    "explain": "2부터 n-1까지 나눠 떨어지는 수(약수)가 하나라도 있으면 즉시 False, 끝까지 없으면 True를 반환한다. 1과 자기 자신 외에 약수가 없는 수, 즉 소수 판별 코드다."
  },
  {
    "cat": "함수",
    "q": "다음 코드의 출력은?\n\nnums = list(map(int, [\"3\", \"1\", \"2\"]))\nnums.sort()\nprint(nums)",
    "choices": [
      "[1, 2, 3]",
      "['1', '2', '3']",
      "[3, 1, 2]",
      "오류 발생"
    ],
    "answer": 0,
    "explain": "map(int, ...)가 문자열 리스트의 각 요소를 정수로 변환하고, sort()가 오름차순으로 제자리 정렬한다. 결과는 [1, 2, 3]. 입력 처리에서 자주 쓰는 패턴이다."
  },
  {
    "cat": "함수",
    "q": "다음 코드를 실행하면?\n\ndef f():\n    x = 10\n\nf()\nprint(x)",
    "choices": [
      "NameError 오류 발생",
      "10",
      "None",
      "0"
    ],
    "answer": 0,
    "explain": "x는 함수 안에서 만들어진 지역변수라 함수가 끝나면 사라진다. 함수 밖에서 x를 출력하려 하면 정의되지 않은 이름이라 NameError가 발생한다."
  },
  {
    "cat": "메서드",
    "q": "다음 코드의 출력은?\n\nwords = \"a,b,c\".split(\",\")\nprint(words, len(words))",
    "choices": [
      "['a', 'b', 'c'] 3",
      "['a,b,c'] 1",
      "['a', ',', 'b', ',', 'c'] 5",
      "abc 3"

      "\"Pen1200.0\" (공백 없음)",
      "\"   Pen1200.0\" (Pen 앞 공백 3칸)"
    ],
    "answer": 0,
    "explain": "it.name:<5 는 'Pen'(3글자)을 폭 5칸 왼쪽 정렬해 뒤에 공백 2칸을 붙인다. it.price:>9.1f 는 1200.0(6글자)을 폭 9칸 오른쪽 정렬해 앞에 공백 3칸을 붙인다. 이어 붙이면 Pen 뒤에 공백이 총 5칸 온다. 클래스 속성 + 서식 지정자 통합 문제."
  },
  {
    "cat": "종합독해",
    "q": "다음 코드의 출력과 역할을 바르게 짝지은 것은?\n\nword = \"level\"\nok = True\nfor i in range(len(word) // 2):\n    if word[i] != word[-1 - i]:\n        ok = False\nprint(ok)",
    "choices": [
      "True - 회문(앞뒤로 읽어도 같은 단어) 검사",
      "False - 회문 검사",
      "True - 알파벳 정렬 여부 검사",
      "오류 발생"
    ],
    "answer": 0,
    "explain": "word[i]와 word[-1 - i]는 앞에서 i번째, 뒤에서 i번째 글자다. 절반까지 비교해 하나라도 다르면 False가 된다. 'level'은 거꾸로 읽어도 같아 True가 출력되는 회문 판별 코드다."
  }
];

/* ===================== 동작 로직 ===================== */
var answerLog = [];        // 정답 여부 누적 (true/false)
var current = null;        // 현재 문제
var recentQ = [];          // 최근 출제 문제(중복 회피용)
var AVOID = 5;             // 최근 몇 개를 회피할지
var answered = false;
var selectedCats = {};     // 계열 선택 상태
var qStatus = {};          // 문제별 최근 결과 (QUESTIONS 인덱스 -> 'ok' | 'no')
var currentOrder = [];     // 현재 문제의 선지 표시 순서 (표시위치 -> 원본 인덱스)
var pickedPos = null;      // 학생이 고른 선지의 표시위치 (튜터 컨텍스트용)
var STORE_KEY = 'finalCardProgress_' + SET_ID;

var chatLog = {};          // 문제 지문 해시 -> [{role, content, brief, ts}]
var chatBusyId = null;     // 응답 대기 중인 문제 id (null이면 대기 없음)
var chatError = null;      // 마지막 오류 메시지 (문제 이동/재전송 시 초기화)
var CHAT_KEEP = 40;        // 문제당 보관할 최대 메시지 수
var CHAT_STORE_KEY = 'finalCardChat_' + SET_ID;

var elCats     = document.getElementById('cats');
var elStats    = document.getElementById('stats');
var elQcat     = document.getElementById('qcat');
var elQuestion = document.getElementById('question');
var elChoices  = document.getElementById('choices');
var elVerdict  = document.getElementById('verdict');
var elExplain  = document.getElementById('explain');
var elNext     = document.getElementById('nextBtn');
var elTiles    = document.getElementById('tiles');
var elOnlyUnsolved = document.getElementById('onlyUnsolved');
var elReset    = document.getElementById('resetProgress');
var elChatMsgs  = document.getElementById('chatMsgs');
var elChatText  = document.getElementById('chatText');
var elChatSend  = document.getElementById('chatSend');
var elChatClear = document.getElementById('chatClear');

function saveProgress() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ answerLog: answerLog, qStatus: qStatus }));
  } catch (e) {}
}
function loadProgress() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data && Array.isArray(data.answerLog)) answerLog = data.answerLog;
    if (data && data.qStatus && typeof data.qStatus === 'object') qStatus = data.qStatus;
  } catch (e) {}
}

/* ===================== AI 튜터 채팅 ===================== */

// 문제 지문 해시를 대화 저장 키로 사용 (문제 순서 변경/추가에도 기록 유지)
function qid(item) {
  var s = item.q, h = 5381;
  for (var i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0;
  return 'q' + (h >>> 0).toString(36);
}

function saveChat() {
  try { localStorage.setItem(CHAT_STORE_KEY, JSON.stringify(chatLog)); } catch (e) {}
}
function loadChat() {
  try {
    var raw = localStorage.getItem(CHAT_STORE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data && typeof data === 'object') chatLog = data;
  } catch (e) {}
}
function trimChat(id) {
  if (chatLog[id] && chatLog[id].length > CHAT_KEEP) {
    chatLog[id] = chatLog[id].slice(-CHAT_KEEP);
  }
}

function renderChat() {
  elChatMsgs.innerHTML = '';
  elChatText.disabled = !current;
  elChatSend.disabled = !current || !!chatBusyId;
  elChatClear.disabled = !current;
  if (!current) {
    elChatMsgs.innerHTML = '<div class="chat-empty">문제가 출제되면 질문할 수 있습니다.</div>';
    return;
  }
  var msgs = chatLog[qid(current)] || [];
  if (msgs.length === 0 && !chatBusyId && !chatError) {
    elChatMsgs.innerHTML = '<div class="chat-empty">이 문제에 대해 궁금한 점을 물어보세요. 대화는 문제별로 저장됩니다.</div>';
    return;
  }
  for (var i = 0; i < msgs.length; i++) {
    var div = document.createElement('div');
    div.className = 'msg ' + (msgs[i].role === 'user' ? 'user' : 'ai');
    div.textContent = msgs[i].content;
    elChatMsgs.appendChild(div);
  }
  if (chatBusyId === qid(current)) {
    var wait = document.createElement('div');
    wait.className = 'msg wait';
    wait.textContent = '튜터가 답변을 작성 중...';
    elChatMsgs.appendChild(wait);
  }
  if (chatError) {
    var err = document.createElement('div');
    err.className = 'msg err';
    err.textContent = chatError;
    elChatMsgs.appendChild(err);
  }
  elChatMsgs.scrollTop = elChatMsgs.scrollHeight;
}

// 시스템 프롬프트: 문제/선지(학생 화면 번호 기준)/정답/해설/학생 상태
function buildSystemPrompt() {
  var lines = [];
  lines.push('너는 고등학교 정보(파이썬) 기말고사 대비를 돕는 튜터다.');
  lines.push('규칙: 학생이 물어본 것에만 답한다. 묻지 않은 내용을 먼저 설명하지 않는다. 간결하게 답한다.');
  lines.push('마크다운 문법 없이 일반 텍스트로만 답한다. 코드는 들여쓰기로 표기한다. 한국어로 답한다.');
  lines.push('');
  lines.push('[현재 문제] (계열: ' + current.cat + ')');
  lines.push(current.q);
  lines.push('');
  lines.push('[선지] (학생 화면에 보이는 번호 기준)');
  for (var i = 0; i < currentOrder.length; i++) {
    lines.push((i + 1) + '. ' + current.choices[currentOrder[i]]);
  }
  var correctPos = currentOrder.indexOf(current.answer);
  lines.push('');
  lines.push('[정답] ' + (correctPos + 1) + '번');
  if (current.explain) lines.push('[해설] ' + current.explain);
  lines.push('');
  if (answered) {
    var ok = qStatus[QUESTIONS.indexOf(current)] === 'ok';
    lines.push('[학생 상태] 답을 제출함. ' + (ok ? '정답을 맞힘.'
      : '오답이었음. 학생이 고른 답: ' + (pickedPos + 1) + '번'));
  } else {
    lines.push('[학생 상태] 아직 답을 제출하지 않음.');
  }
  return lines.join('\n');
}

// 이전 대화를 60자 요약본으로 압축한 컨텍스트 블록
function historyBlock(msgs) {
  var out = [];
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    var text = m.brief || String(m.content).slice(0, 60);
    out.push((m.role === 'user' ? '학생: ' : '튜터: ') + text);
  }
  return out.join('\n');
}

function callOpenAI(model, messages, maxTokens, effort) {
  return fetch(OPENAI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + OPENAI_API_KEY },
    body: JSON.stringify({ model: model, messages: messages,
                           max_completion_tokens: maxTokens, reasoning_effort: effort })
  }).then(function (res) {
    if (!res.ok) {
      return res.json().then(function (e) {
        throw new Error(e && e.error && e.error.message ? e.error.message : 'HTTP ' + res.status);
      }, function () { throw new Error('HTTP ' + res.status); });
    }
    return res.json();
  }).then(function (data) {
    var msg = data.choices && data.choices[0] && data.choices[0].message;
    if (!msg || !msg.content) throw new Error('빈 응답을 받았습니다.');
    return String(msg.content).trim();
  });
}

function sendChat() {
  if (chatBusyId || !current) return;
  var text = elChatText.value.trim();
  if (!text) return;
  var id = qid(current);
  if (!chatLog[id]) chatLog[id] = [];
  var prior = chatLog[id].slice();
  var userMsg = { role: 'user', content: text, brief: null, ts: Date.now() };
  chatLog[id].push(userMsg);
  trimChat(id); saveChat();
  elChatText.value = '';
  chatBusyId = id;
  chatError = null;
  renderChat();

  var messages = [{ role: 'system', content: buildSystemPrompt() }];
  var hist = historyBlock(prior);
  if (hist) messages.push({ role: 'system', content: '[이전 대화 요약]\n' + hist });
  messages.push({ role: 'user', content: text });

  callOpenAI(CHAT_MODEL, messages, 1200, 'low').then(function (reply) {
    var aiMsg = { role: 'assistant', content: reply, brief: null, ts: Date.now() };
    chatLog[id].push(aiMsg);
    trimChat(id); saveChat();
    chatBusyId = null;
    renderChat();
    summarizePair(userMsg, aiMsg);
  }).catch(function (e) {
    // 실패: 질문을 기록에서 되돌리고 입력창에 복원 (다시 전송하면 재시도)
    var idx = chatLog[id].indexOf(userMsg);
    if (idx !== -1) chatLog[id].splice(idx, 1);
    saveChat();
    chatBusyId = null;
    chatError = '응답 실패: ' + e.message + ' (질문을 다시 전송해 보세요)';
    if (!elChatText.value) elChatText.value = text;
    renderChat();
  });
}

// 방금 주고받은 질문/답변을 60자 이내로 요약해 brief에 저장 (다음 요청의 컨텍스트용)
function summarizePair(userMsg, aiMsg) {
  var messages = [
    { role: 'system', content: '학생 질문과 튜터 답변을 각각 60글자 이내 한국어로 요약한다. 반드시 {"ask":"...","reply":"..."} 형태의 JSON만 출력한다.' },
    { role: 'user', content: '질문: ' + userMsg.content + '\n답변: ' + aiMsg.content }
  ];
  callOpenAI(SUMMARY_MODEL, messages, 400, 'none').then(function (out) {
    var s = out.indexOf('{'), e = out.lastIndexOf('}');
    if (s === -1 || e === -1) throw new Error('bad json');
    var obj = JSON.parse(out.slice(s, e + 1));
    userMsg.brief = String(obj.ask || '').slice(0, 60) || userMsg.content.slice(0, 60);
    aiMsg.brief = String(obj.reply || '').slice(0, 60) || aiMsg.content.slice(0, 60);
    saveChat();
  }).catch(function () {
    userMsg.brief = userMsg.content.slice(0, 60);
    aiMsg.brief = aiMsg.content.slice(0, 60);
    saveChat();
  });
}

/* ===================== 기존 로직 ===================== */

// 데이터에서 계열 목록 추출(등장 순서 유지)
function getCategories() {
  var seen = {}, list = [];
  for (var i = 0; i < QUESTIONS.length; i++) {
    var c = QUESTIONS[i].cat;
    if (!seen[c]) { seen[c] = true; list.push(c); }
  }
  return list;
}

function buildCats() {
  var cats = getCategories();
  elCats.innerHTML = '';
  for (var i = 0; i < cats.length; i++) {
    (function (c) {
      if (selectedCats[c] === undefined) selectedCats[c] = true;
      var label = document.createElement('label');
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selectedCats[c];
      cb.addEventListener('change', function () {
        selectedCats[c] = cb.checked;
        nextQuestion();
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + c));
      elCats.appendChild(label);
    })(cats[i]);
  }
}

function pool() {
  return QUESTIONS.filter(function (item) { return selectedCats[item.cat]; });
}

function pickRandom() {
  var p = pool();
  if (elOnlyUnsolved && elOnlyUnsolved.checked) {
    p = p.filter(function (item) { return qStatus[QUESTIONS.indexOf(item)] !== 'ok'; });
  }
  if (p.length === 0) return null;
  var avoid = recentQ.slice(-AVOID);
  var candidates = p.filter(function (item) { return avoid.indexOf(item) === -1; });
  if (candidates.length === 0) candidates = p;   // 풀이 작으면 회피 불가, 전체에서 선택
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function renderStats() {
  var windows = [8, 16, 32, 64];
  elStats.innerHTML = '';
  for (var i = 0; i < windows.length; i++) {
    var n = windows[i];
    var recent = answerLog.slice(-n);
    var correct = recent.filter(function (x) { return x; }).length;
    var valStr = answerLog.length ? Math.round(correct / n * 100) + '%' : '--';
    var subStr = correct + '/' + n;
    var div = document.createElement('div');
    div.className = 'stat';
    div.innerHTML = '<div class="stat-label">최근 ' + n + '</div>' +
                    '<div class="stat-val">' + valStr + '</div>' +
                    '<div class="stat-sub">' + subStr + '</div>';
    elStats.appendChild(div);
  }
}

function renderTiles() {
  elTiles.innerHTML = '';
  for (var i = 0; i < QUESTIONS.length; i++) {
    if (!selectedCats[QUESTIONS[i].cat]) continue;
    var t = document.createElement('span');
    t.className = 'tile';
    var st = qStatus[i];
    if (st === 'ok') t.classList.add('ok');
    else if (st === 'no') t.classList.add('no');
    elTiles.appendChild(t);
  }
}

function nextQuestion() {
  answered = false;
  pickedPos = null;
  chatError = null;
  current = pickRandom();
  if (current) {
    recentQ.push(current);
    if (recentQ.length > AVOID) recentQ.shift();
  }

  elVerdict.textContent = '';
  elVerdict.className = 'verdict';
  elExplain.style.display = 'none';
  elChoices.innerHTML = '';
  renderTiles();
  renderChat();

  if (!current) {
    elQcat.textContent = '';
    var emptyMsg = (pool().length === 0)
      ? '계열을 하나 이상 선택하세요.'
      : '선택한 계열에서 안 푼/틀린 문제가 없습니다.';
    elQuestion.innerHTML = '<span class="empty">' + emptyMsg + '</span>';
    elNext.disabled = true;
    return;
  }

  elNext.disabled = false;
  elQcat.textContent = '[' + current.cat + ']';
  elQuestion.textContent = current.q;
  elExplain.textContent = current.explain || '';

  var labels = ['1', '2', '3', '4', '5'];
  currentOrder = shuffledIndices(current.choices.length);  // 풀 때마다 선지 순서 셔플
  for (var i = 0; i < currentOrder.length; i++) {
    (function (d) {
      var origIdx = currentOrder[d];
      var btn = document.createElement('button');
      btn.className = 'choice';
      btn.innerHTML = '<span class="mark">' + labels[d] + '.</span>' + escapeHtml(current.choices[origIdx]);
      btn.addEventListener('click', function () { select(d); });
      elChoices.appendChild(btn);
    })(i);
  }
}

function select(d) {
  if (answered) return;
  answered = true;
  pickedPos = d;
  var btns = elChoices.querySelectorAll('.choice');
  var correctPos = currentOrder.indexOf(current.answer);  // 정답의 셔플된 표시위치
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    if (i === correctPos) btns[i].classList.add('correct');
  }

  var ok = (currentOrder[d] === current.answer);
  qStatus[QUESTIONS.indexOf(current)] = ok ? 'ok' : 'no';
  if (ok) {
    elVerdict.textContent = '정답';
    elVerdict.className = 'verdict ok';
  } else {
    btns[d].classList.add('wrong');
    elVerdict.textContent = '오답 (정답: ' + (correctPos + 1) + '번)';
    elVerdict.className = 'verdict no';
    if (current.explain) elExplain.style.display = 'block';
  }

  answerLog.push(ok);
  renderStats();
  renderTiles();
  saveProgress();
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// 0..n-1 인덱스를 Fisher-Yates로 섞은 배열 반환
function shuffledIndices(n) {
  var arr = [];
  for (var i = 0; i < n; i++) arr.push(i);
  for (var i = n - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

document.getElementById('checkAll').addEventListener('click', function () {
  var cats = getCategories();
  for (var i = 0; i < cats.length; i++) selectedCats[cats[i]] = true;
  buildCats(); nextQuestion();
});
document.getElementById('uncheckAll').addEventListener('click', function () {
  var cats = getCategories();
  for (var i = 0; i < cats.length; i++) selectedCats[cats[i]] = false;
  buildCats(); nextQuestion();
});
elNext.addEventListener('click', nextQuestion);
elOnlyUnsolved.addEventListener('change', nextQuestion);
elReset.addEventListener('click', function () {
  if (!confirm('풀이 기록과 통계, AI 대화 기록을 모두 초기화할까요?')) return;
  answerLog = [];
  qStatus = {};
  recentQ = [];
  chatLog = {};
  try { localStorage.removeItem(STORE_KEY); } catch (e) {}
  try { localStorage.removeItem(CHAT_STORE_KEY); } catch (e) {}
  renderStats();
  nextQuestion();
});

elChatSend.addEventListener('click', sendChat);
elChatText.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});
elChatClear.addEventListener('click', function () {
  if (!current) return;
  if (!confirm('이 문제의 대화 기록을 지울까요?')) return;
  delete chatLog[qid(current)];
  saveChat();
  chatError = null;
  renderChat();
});

loadProgress();
loadChat();
buildCats();
renderStats();
nextQuestion();
</script>
