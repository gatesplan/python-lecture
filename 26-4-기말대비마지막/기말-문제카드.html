<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>정보 기말 문제 카드</title>
<style>
  body { font-family: "Malgun Gothic", "맑은 고딕", sans-serif; max-width: 760px;
         margin: 0 auto; padding: 24px; line-height: 1.6; color: #111; background: #fff; }
  h1 { font-size: 22px; border-bottom: 2px solid #333; padding-bottom: 8px; }

  /* 계열 필터 */
  .panel { border: 1px solid #ccc; border-radius: 6px; padding: 12px 16px; margin: 14px 0; }
  .panel-title { font-size: 13px; color: #666; margin-bottom: 8px; }
  .cats { display: flex; flex-wrap: wrap; gap: 6px 16px; }
  .cats label { font-size: 14px; cursor: pointer; user-select: none; }
  .cat-actions { margin-top: 10px; display: flex; gap: 8px; }
  .mini { padding: 4px 10px; font-size: 13px; font-family: inherit; cursor: pointer;
          border: 1px solid #888; border-radius: 4px; background: #f2f2f2; }
  .mini:hover { background: #e6e6e6; }

  /* 정답률 통계 */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 14px 0; }
  .stat { border: 1px solid #ccc; border-radius: 6px; padding: 8px; text-align: center; }
  .stat-label { font-size: 12px; color: #777; }
  .stat-val { font-size: 20px; font-weight: bold; }
  .stat-sub { font-size: 12px; color: #999; }

  /* 문제별 진행 타일 */
  .tiles { display: flex; flex-wrap: wrap; gap: 2px; margin: 10px 0 14px; }
  .tile { width: 11px; height: 11px; border-radius: 2px; background: #ddd; }
  .tile.ok { background: #4a9a52; }
  .tile.no { background: #c14a4a; }
  .opt { font-size: 14px; cursor: pointer; user-select: none; }

  /* 문제 카드 */
  .card { border: 1px solid #bbb; border-radius: 6px; padding: 20px; margin-top: 10px; }
  .question { font-size: 17px; font-weight: bold; margin: 4px 0 18px; white-space: pre-wrap; }
  .qcat { font-size: 12px; color: #888; }

  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice { text-align: left; padding: 10px 14px; border: 1px solid #ccc; border-radius: 4px;
            background: #fafafa; cursor: pointer; font-size: 15px; font-family: inherit;
            white-space: pre-wrap; }
  .choice:hover:enabled { background: #eef3ff; border-color: #88a; }
  .choice:disabled { cursor: default; }
  .choice .mark { display: inline-block; width: 22px; color: #888; font-weight: bold; }
  .choice.correct { background: #d8f0db; border-color: #4a9a52; }
  .choice.wrong   { background: #f6d9d9; border-color: #c14a4a; }

  .verdict { margin-top: 16px; font-weight: bold; }
  .verdict.ok { color: #2e7d32; }
  .verdict.no { color: #c62828; }
  .explain { margin-top: 8px; padding: 10px 14px; background: #f5f5f5;
             border-left: 4px solid #888; font-size: 14px; display: none; white-space: pre-wrap; }
  .empty { color: #c62828; font-weight: bold; }

  .actions { margin-top: 18px; }
  button.btn { padding: 9px 18px; font-size: 15px; font-family: inherit; cursor: pointer;
               border: 1px solid #555; border-radius: 4px; background: #f0f0f0; }
  button.btn:hover:enabled { background: #e2e2e2; }
  button.btn:disabled { color: #aaa; border-color: #ccc; cursor: default; background: #f7f7f7; }
</style>
</head>
<body>

<h1>정보 기말 문제 카드</h1>

<div class="panel">
  <div class="panel-title">계열 선택</div>
  <div class="cats" id="cats"></div>
  <div class="cat-actions">
    <button class="mini" id="checkAll">전체 선택</button>
    <button class="mini" id="uncheckAll">전체 해제</button>
  </div>
</div>

<div class="panel">
  <label class="opt"><input type="checkbox" id="onlyUnsolved"> 새 문제는 안 푼/틀린 문제 중에서만 출제</label>
  <div class="cat-actions">
    <button class="mini" id="resetProgress">기록 초기화</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="tiles" id="tiles"></div>

<div class="card" id="quiz">
  <div class="qcat" id="qcat"></div>
  <div class="question" id="question"></div>
  <div class="choices" id="choices"></div>
  <div class="verdict" id="verdict"></div>
  <div class="explain" id="explain"></div>
  <div class="actions">
    <button class="btn" id="nextBtn">다음 문제</button>
  </div>
</div>

<script>
/* =========================================================
   문제 데이터 (나중에 이 배열만 채우면 됨)
   - cat     : 계열(체크박스가 자동 생성됨)
   - q       : 문제 지문
   - choices : 선택지 3~5개
   - answer  : 정답 인덱스(0부터)
   - explain : 해설 (줄바꿈은 \n)
   ========================================================= */
const QUESTIONS = [
  {
    "cat": "문법",
    "q": "print(\"A\", \"B\", \"C\", sep=\"*\") 의 출력 결과는?",
    "choices": [
      "A B C",
      "A*B*C",
      "ABC",
      "*A*B*C*"
    ],
    "answer": 1,
    "explain": "sep는 여러 인자 사이에 끼울 구분자다. 기본값은 공백 한 칸이지만 sep=\"*\"로 바꾸면 인자 사이마다 * 가 들어가 A*B*C 가 된다. sep는 인자 '사이'에만 들어가고 맨 앞/뒤에는 붙지 않는다."
  },
  {
    "cat": "문법",
    "q": "다음 두 줄의 출력 결과는?\nprint(\"hello\", end=' ')\nprint(\"world\")",
    "choices": [
      "helloworld",
      "hello\nworld",
      "hello world",
      "hello  world"
    ],
    "answer": 2,
    "explain": "end는 출력 끝에 붙일 문자로 기본값은 줄바꿈(\\n)이다. 첫 줄에서 end=' '로 바꿨으므로 줄바꿈 대신 공백이 붙어 다음 출력이 같은 줄에 이어진다. 결과는 'hello world'."
  },
  {
    "cat": "문법",
    "q": "input() 함수에 대한 설명으로 옳은 것은?",
    "choices": [
      "입력값을 자동으로 숫자로 변환해 반환한다",
      "반환값은 입력 내용에 따라 정수 또는 실수가 된다",
      "반환값은 항상 정수다",
      "반환값은 항상 문자열이다"
    ],
    "answer": 3,
    "explain": "input()의 반환값은 항상 문자열(str)이다. 숫자 계산을 하려면 int()나 float()로 직접 형변환해야 한다. 예를 들어 '5'와 '3'을 입력받아 더하면 int 변환 전에는 '53'(문자열 이어붙이기)이 된다."
  },
  {
    "cat": "문법",
    "q": "공백으로 구분된 두 정수를 입력받아 a, b에 각각 저장하는 올바른 코드는?",
    "choices": [
      "a, b = input().split()",
      "a, b = int(input().split())",
      "a, b = map(int, input().split())",
      "a, b = int(input()), int(input())"
    ],
    "answer": 2,
    "explain": "한 줄에 공백으로 구분된 여러 정수를 받으려면 input().split()으로 문자열 리스트를 만든 뒤 map(int, ...)로 각 요소를 int로 변환한다. 1번은 문자열 그대로 들어가고, 2번은 split() 결과(리스트)에 int()를 직접 적용해 에러가 난다."
  },
  {
    "cat": "문법",
    "q": "다음 연산 결과로 옳은 것은?\nprint(7 // 2, 7 % 2, 2 ** 3)",
    "choices": [
      "3.5 1 6",
      "3 1 6",
      "3 1 8",
      "4 1 8"
    ],
    "answer": 2,
    "explain": "// 는 정수 나눗셈(소수점 버림)이므로 7//2=3, % 는 나머지이므로 7%2=1, ** 는 거듭제곱이므로 2**3=8. 따라서 '3 1 8'."
  },
  {
    "cat": "문법",
    "q": "복합 대입 연산자 a *= 7 과 동일한 의미는?",
    "choices": [
      "a = a + 7",
      "a = 7",
      "a = a ** 7",
      "a = a * 7"
    ],
    "answer": 3,
    "explain": "a *= 7 은 a = a * 7 의 축약형이다. 같은 원리로 += 는 더하기, -= 는 빼기, //= 는 정수나눗셈, %= 는 나머지, **= 는 거듭제곱의 축약형이다."
  },
  {
    "cat": "문법",
    "q": "다음 코드를 위에서부터 실행했을 때 마지막 a의 값은?\na = 5\na += 3\na *= 2\na -= 1\na //= 3",
    "choices": [
      "5",
      "4",
      "6",
      "15"
    ],
    "answer": 0,
    "explain": "대입연산 추적은 한 줄씩 직전 결과를 다음 줄에 반영한다. a=5 -> a+=3은 8 -> a*=2는 16 -> a-=1은 15 -> a//=3은 15//3=5. 최종 a는 5다."
  },
  {
    "cat": "문법",
    "q": "다음 논리 연산의 결과는?\nprint(10 > 5 and 3 > 4)",
    "choices": [
      "True",
      "10",
      "에러",
      "False"
    ],
    "answer": 3,
    "explain": "and는 두 조건이 모두 참이어야 True다. 10 > 5는 True지만 3 > 4는 False이므로 전체는 False다. or였다면 하나만 참이어도 True가 된다."
  },
  {
    "cat": "문법",
    "q": "연산자 우선순위에 따라 다음 식의 결과는?\nprint(2 + 3 * 4)",
    "choices": [
      "20",
      "24",
      "14",
      "9"
    ],
    "answer": 2,
    "explain": "산술 연산에서 곱셈(*)이 덧셈(+)보다 우선순위가 높다. 따라서 3*4를 먼저 계산해 12, 그 다음 2+12=14. (2+3)을 먼저 하려면 괄호가 필요하다."
  },
  {
    "cat": "문법",
    "q": "파이썬 연산자 우선순위가 높은 것부터 낮은 순서로 올바르게 나열한 것은?",
    "choices": [
      "산술 > 비교 > not > and > or",
      "or > and > not > 비교 > 산술",
      "비교 > 산술 > and > or > not",
      "and > or > not > 산술 > 비교"
    ],
    "answer": 0,
    "explain": "우선순위는 산술 > 비교 > not > and > or 순이다. 즉 계산을 먼저 하고, 비교한 뒤, not으로 뒤집고, and를 묶고, 마지막에 or로 묶는다. 헷갈리면 괄호로 의도를 명확히 한다."
  },
  {
    "cat": "문법",
    "q": "== 와 = 의 차이로 옳은 것은?",
    "choices": [
      "둘 다 값을 비교한다",
      "== 는 대입, = 는 비교다",
      "== 는 비교(같은지 판단), = 는 대입(값을 넣음)이다",
      "둘 다 변수에 값을 넣는다"
    ],
    "answer": 2,
    "explain": "== 는 양쪽이 같은지 판단하는 비교 연산자로 결과가 True/False다. = 는 오른쪽 값을 왼쪽 변수에 넣는 대입 연산자다. if 조건에서 = 를 쓰면 의도와 다르게 동작하거나 에러가 난다."
  },
  {
    "cat": "문법",
    "q": "다음 조건문에서 score = 92 일 때 출력은?\nif score >= 95:\n    print(\"A+\")\nelif score >= 90:\n    print(\"A\")\nelse:\n    print(\"F\")",
    "choices": [
      "A+",
      "A",
      "F",
      "A+\\nA"
    ],
    "answer": 1,
    "explain": "elif는 위에서부터 검사해 처음 참이 되는 블록 하나만 실행한다. score=92는 95 이상은 아니지만 90 이상이므로 'A'가 출력되고 나머지는 검사하지 않는다."
  },
  {
    "cat": "문법",
    "q": "변수 x가 10 이상 20 이하인지 검사하는 올바른 파이썬 식은?",
    "choices": [
      "if 10 <= x <= 20:",
      "if 10 <= x and 20 >= x or 0:",
      "if x >= 10 or x <= 20:",
      "if 10 < x < 20:"
    ],
    "answer": 0,
    "explain": "파이썬은 10 <= x <= 20 처럼 연속 비교를 지원하며 이는 x >= 10 and x <= 20 과 같다. 3번은 or라서 모든 수가 참이 되고, 4번은 양 끝값 10과 20을 제외(미만/초과)하므로 '이상/이하'가 아니다."
  },
  {
    "cat": "문법",
    "q": "list(range(1, 10, 2)) 의 결과는?",
    "choices": [
      "[1, 3, 5, 7, 9]",
      "[1, 2, 3, ..., 10]",
      "[1, 3, 5, 7, 9, 11]",
      "[2, 4, 6, 8, 10]"
    ],
    "answer": 0,
    "explain": "range(start, stop, step)에서 stop(10)은 미포함이다. 1부터 시작해 2씩 증가하며 10 미만까지 가므로 1, 3, 5, 7, 9 가 된다. 9 다음은 11이 되어 10을 넘으므로 포함되지 않는다."
  },
  {
    "cat": "문법",
    "q": "list(range(10, 0, -2)) 의 결과는?",
    "choices": [
      "[10, 8, 6, 4, 2, 0]",
      "[]",
      "[0, 2, 4, 6, 8, 10]",
      "[10, 8, 6, 4, 2]"
    ],
    "answer": 3,
    "explain": "step이 음수면 감소하며 진행한다. stop(0)은 미포함이므로 10, 8, 6, 4, 2 까지 나오고 0은 포함되지 않는다. step이 음수일 때는 start가 stop보다 커야 결과가 나온다."
  },
  {
    "cat": "문법",
    "q": "break와 continue의 차이로 옳은 것은?",
    "choices": [
      "break는 현재 회차만 건너뛰고, continue는 반복문을 완전히 종료한다",
      "둘 다 반복문을 완전히 종료한다",
      "break는 반복문을 완전히 종료하고, continue는 현재 회차만 건너뛰고 다음 반복으로 간다",
      "둘 다 현재 회차만 건너뛴다"
    ],
    "answer": 2,
    "explain": "break는 반복문 전체를 즉시 빠져나온다. continue는 현재 회차의 남은 부분만 건너뛰고 다음 반복(조건 검사)으로 돌아간다. while에서 continue 전에 증감식을 빠뜨리면 무한루프가 되기 쉽다."
  },
  {
    "cat": "문법",
    "q": "다음 코드의 출력은?\ntotal = 0\nfor i in range(1, 6):\n    if i == 3:\n        continue\n    total += i\nprint(total)",
    "choices": [
      "15",
      "12",
      "10",
      "13"
    ],
    "answer": 1,
    "explain": "i가 3일 때 continue로 더하기를 건너뛴다. 따라서 1+2+4+5 = 12 가 누적된다. 만약 continue가 없었다면 1+2+3+4+5 = 15 였을 것이다."
  },
  {
    "cat": "문법",
    "q": "arr = ['A', 'B', 'C', 'D', 'E'] 일 때 arr[-1] 의 값은?",

      "'A'",
      "'E'",

  },
  {

    "choices": [
      "['A', 'B', 'C']",
      "['B', 'C']",
      "['A']",

    ],
    "answer": 3,
    "explain": "슬라이싱 [시작:끝]은 끝 인덱스를 미포함한다. arr[0:2]는 인덱스 0, 1만 포함하므로 ['A', 'B']다. 끝값 2(즉 'C')는 포함되지 않는다."
  },
  {

    "choices": [
      "[3, 99, 1, 2, 4]",
      "[3, 1, 2, 4, 99]",
      "[99, 3, 1, 2, 4]",
      "[3, 1, 99, 2, 4]"
    ],
    "answer": 0,
    "explain": "append(4)는 맨 뒤에 4를 추가해 [3, 1, 2, 4]. 그다음 insert(1, 99)는 인덱스 1 자리에 99를 끼워 넣어 기존 요소들을 한 칸씩 밀어 [3, 99, 1, 2, 4]가 된다."
  },
  {
    "cat": "문법",
    "q": "remove() 와 pop() 의 차이로 옳은 것은?",
    "choices": [
      "둘 다 인덱스로 삭제한다",
      "remove는 값으로 삭제하고, pop은 인덱스로 삭제하며 그 값을 반환한다",
      "remove는 값을 반환하고, pop은 반환하지 않는다",
      "둘 다 값으로 삭제한다"
    ],
    "answer": 1,
    "explain": "remove(값)은 해당 값을 찾아 첫 번째 것을 삭제하며 반환값이 없다. pop(인덱스)은 그 위치의 요소를 삭제하면서 그 값을 반환한다. 인덱스를 생략한 pop()은 맨 뒤 요소를 꺼낸다."
  },
  {
    "cat": "문법",
    "q": "sort() 와 sorted() 의 차이로 옳은 것은?",
    "choices": [
      "sort()는 새 리스트를 반환하고, sorted()는 원본을 바꾼다",
      "둘 다 원본을 바꾼다",
      "sort()는 원본을 직접 정렬하고 반환값이 None, sorted()는 원본은 그대로 두고 정렬된 새 리스트를 반환한다",
      "둘 다 새 리스트를 반환한다"
    ],

/* ===================== 동작 로직 ===================== */
var answerLog = [];        // 정답 여부 누적 (true/false)
var current = null;        // 현재 문제
var recentQ = [];          // 최근 출제 문제(중복 회피용)
var AVOID = 5;             // 최근 몇 개를 회피할지
var answered = false;
var selectedCats = {};     // 계열 선택 상태
var qStatus = {};          // 문제별 최근 결과 (QUESTIONS 인덱스 -> 'ok' | 'no')
var currentOrder = [];     // 현재 문제의 선지 표시 순서 (표시위치 -> 원본 인덱스)
var STORE_KEY = 'finalCardProgress';

var elCats     = document.getElementById('cats');
var elStats    = document.getElementById('stats');
var elQcat     = document.getElementById('qcat');
var elQuestion = document.getElementById('question');
var elChoices  = document.getElementById('choices');
var elVerdict  = document.getElementById('verdict');
var elExplain  = document.getElementById('explain');
var elNext     = document.getElementById('nextBtn');
var elTiles    = document.getElementById('tiles');
var elOnlyUnsolved = document.getElementById('onlyUnsolved');
var elReset    = document.getElementById('resetProgress');

function saveProgress() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify({ answerLog: answerLog, qStatus: qStatus }));
  } catch (e) {}
}
function loadProgress() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data && Array.isArray(data.answerLog)) answerLog = data.answerLog;
    if (data && data.qStatus && typeof data.qStatus === 'object') qStatus = data.qStatus;
  } catch (e) {}
}

// 데이터에서 계열 목록 추출(등장 순서 유지)
function getCategories() {
  var seen = {}, list = [];
  for (var i = 0; i < QUESTIONS.length; i++) {
    var c = QUESTIONS[i].cat;
    if (!seen[c]) { seen[c] = true; list.push(c); }
  }
  return list;
}

function buildCats() {
  var cats = getCategories();
  elCats.innerHTML = '';
  for (var i = 0; i < cats.length; i++) {
    (function (c) {
      if (selectedCats[c] === undefined) selectedCats[c] = true;
      var label = document.createElement('label');
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selectedCats[c];
      cb.addEventListener('change', function () {
        selectedCats[c] = cb.checked;
        nextQuestion();
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(' ' + c));
      elCats.appendChild(label);
    })(cats[i]);
  }
}

function pool() {
  return QUESTIONS.filter(function (item) { return selectedCats[item.cat]; });
}

function pickRandom() {
  var p = pool();
  if (elOnlyUnsolved && elOnlyUnsolved.checked) {
    p = p.filter(function (item) { return qStatus[QUESTIONS.indexOf(item)] !== 'ok'; });
  }
  if (p.length === 0) return null;
  var avoid = recentQ.slice(-AVOID);
  var candidates = p.filter(function (item) { return avoid.indexOf(item) === -1; });
  if (candidates.length === 0) candidates = p;   // 풀이 작으면 회피 불가, 전체에서 선택
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function renderStats() {
  var windows = [8, 16, 32, 64];
  elStats.innerHTML = '';
  for (var i = 0; i < windows.length; i++) {
    var n = windows[i];
    var recent = answerLog.slice(-n);
    var correct = recent.filter(function (x) { return x; }).length;
    var valStr = answerLog.length ? Math.round(correct / n * 100) + '%' : '--';
    var subStr = correct + '/' + n;
    var div = document.createElement('div');
    div.className = 'stat';
    div.innerHTML = '<div class="stat-label">최근 ' + n + '</div>' +
                    '<div class="stat-val">' + valStr + '</div>' +
                    '<div class="stat-sub">' + subStr + '</div>';
    elStats.appendChild(div);
  }
}

function renderTiles() {
  elTiles.innerHTML = '';
  for (var i = 0; i < QUESTIONS.length; i++) {
    if (!selectedCats[QUESTIONS[i].cat]) continue;
    var t = document.createElement('span');
    t.className = 'tile';
    var st = qStatus[i];
    if (st === 'ok') t.classList.add('ok');
    else if (st === 'no') t.classList.add('no');
    elTiles.appendChild(t);
  }
}

function nextQuestion() {
  answered = false;
  current = pickRandom();
  if (current) {
    recentQ.push(current);
    if (recentQ.length > AVOID) recentQ.shift();
  }

  elVerdict.textContent = '';
  elVerdict.className = 'verdict';
  elExplain.style.display = 'none';
  elChoices.innerHTML = '';
  renderTiles();

  if (!current) {
    elQcat.textContent = '';
    var emptyMsg = (pool().length === 0)
      ? '계열을 하나 이상 선택하세요.'
      : '선택한 계열에서 안 푼/틀린 문제가 없습니다.';
    elQuestion.innerHTML = '<span class="empty">' + emptyMsg + '</span>';
    elNext.disabled = true;
    return;
  }

  elNext.disabled = false;
  elQcat.textContent = '[' + current.cat + ']';
  elQuestion.textContent = current.q;
  elExplain.textContent = current.explain || '';

  var labels = ['1', '2', '3', '4', '5'];
  currentOrder = shuffledIndices(current.choices.length);  // 풀 때마다 선지 순서 셔플
  for (var i = 0; i < currentOrder.length; i++) {
    (function (d) {
      var origIdx = currentOrder[d];
      var btn = document.createElement('button');
      btn.className = 'choice';
      btn.innerHTML = '<span class="mark">' + labels[d] + '.</span>' + escapeHtml(current.choices[origIdx]);
      btn.addEventListener('click', function () { select(d); });
      elChoices.appendChild(btn);
    })(i);
  }
}

function select(d) {
  if (answered) return;
  answered = true;
  var btns = elChoices.querySelectorAll('.choice');
  var correctPos = currentOrder.indexOf(current.answer);  // 정답의 셔플된 표시위치
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    if (i === correctPos) btns[i].classList.add('correct');
  }

  var ok = (currentOrder[d] === current.answer);
  qStatus[QUESTIONS.indexOf(current)] = ok ? 'ok' : 'no';
  if (ok) {
    elVerdict.textContent = '정답';
    elVerdict.className = 'verdict ok';
  } else {
    btns[d].classList.add('wrong');
    elVerdict.textContent = '오답 (정답: ' + (correctPos + 1) + '번)';
    elVerdict.className = 'verdict no';
    if (current.explain) elExplain.style.display = 'block';
  }

  answerLog.push(ok);
  renderStats();
  renderTiles();
  saveProgress();
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// 0..n-1 인덱스를 Fisher-Yates로 섞은 배열 반환
function shuffledIndices(n) {
  var arr = [];
  for (var i = 0; i < n; i++) arr.push(i);
  for (var i = n - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

document.getElementById('checkAll').addEventListener('click', function () {
  var cats = getCategories();
  for (var i = 0; i < cats.length; i++) selectedCats[cats[i]] = true;
  buildCats(); nextQuestion();
});
document.getElementById('uncheckAll').addEventListener('click', function () {
  var cats = getCategories();
  for (var i = 0; i < cats.length; i++) selectedCats[cats[i]] = false;
  buildCats(); nextQuestion();
});
elNext.addEventListener('click', nextQuestion);
elOnlyUnsolved.addEventListener('change', nextQuestion);
elReset.addEventListener('click', function () {
  if (!confirm('풀이 기록과 통계를 모두 초기화할까요?')) return;
  answerLog = [];
  qStatus = {};
  recentQ = [];
  try { localStorage.removeItem(STORE_KEY); } catch (e) {}
  renderStats();
  nextQuestion();
});

loadProgress();
buildCats();
renderStats();
nextQuestion();
</script>
