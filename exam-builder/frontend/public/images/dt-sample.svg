<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="sans-serif">
  <rect x="0" y="0" width="560" height="380" fill="white"/>

  <!-- edges -->
  <g stroke="#555" stroke-width="1.5">
    <line x1="280" y1="64" x2="150" y2="150"/>
    <line x1="280" y1="64" x2="410" y2="150"/>
    <line x1="150" y1="194" x2="80" y2="290"/>
    <line x1="150" y1="194" x2="220" y2="290"/>
    <line x1="410" y1="194" x2="340" y2="290"/>
    <line x1="410" y1="194" x2="480" y2="290"/>
  </g>

  <!-- edge labels -->
  <g font-size="13" fill="#1a6">
    <text x="200" y="108" text-anchor="middle">Yes</text>
    <text x="360" y="108" text-anchor="middle">No</text>
    <text x="103" y="246" text-anchor="middle">Yes</text>
    <text x="195" y="246" text-anchor="middle">No</text>
    <text x="363" y="246" text-anchor="middle">Yes</text>
    <text x="455" y="246" text-anchor="middle">No</text>
  </g>

  <!-- decision nodes -->
  <g>
    <rect x="220" y="20" width="120" height="44" rx="6" fill="#eef3fb" stroke="#3a6ea5"/>
    <text x="280" y="47" text-anchor="middle" font-size="14">나이 &lt;= 30 ?</text>

    <rect x="90" y="150" width="120" height="44" rx="6" fill="#eef3fb" stroke="#3a6ea5"/>
    <text x="150" y="177" text-anchor="middle" font-size="14">학생인가 ?</text>

    <rect x="350" y="150" width="120" height="44" rx="6" fill="#eef3fb" stroke="#3a6ea5"/>
    <text x="410" y="177" text-anchor="middle" font-size="14">소득 = 높음 ?</text>
  </g>

  <!-- leaves -->
  <g font-size="12">
    <rect x="25" y="290" width="110" height="52" rx="6" fill="#f3f3f3" stroke="#888"/>
    <text x="80" y="312" text-anchor="middle" font-weight="bold">Leaf 1</text>
    <text x="80" y="330" text-anchor="middle">구매 4 / 미구매 0</text>

    <rect x="165" y="290" width="110" height="52" rx="6" fill="#f3f3f3" stroke="#888"/>
    <text x="220" y="312" text-anchor="middle" font-weight="bold">Leaf 2</text>
    <text x="220" y="330" text-anchor="middle">구매 1 / 미구매 3</text>

    <rect x="285" y="290" width="110" height="52" rx="6" fill="#f3f3f3" stroke="#888"/>
    <text x="340" y="312" text-anchor="middle" font-weight="bold">Leaf 3</text>
    <text x="340" y="330" text-anchor="middle">구매 3 / 미구매 1</text>

    <rect x="425" y="290" width="110" height="52" rx="6" fill="#f3f3f3" stroke="#888"/>
    <text x="480" y="312" text-anchor="middle" font-weight="bold">Leaf 4</text>
    <text x="480" y="330" text-anchor="middle">구매 2 / 미구매 2</text>
  </g>
</svg>
